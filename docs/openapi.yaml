openapi: 3.1.0
info:
  title: PetPosture API
  version: '1.0.0'
  description: Headless ecommerce API for PetPosture (Laravel 11 + Lunar PHP)

servers:
  - url: /api/v1
    description: Versioned (preferred)
  - url: /api
    description: Legacy unversioned

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token

  schemas:
    Money:
      type: number
      format: float
      example: 29.99

    Address:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        line_one: { type: string }
        line_two: { type: string, nullable: true }
        city: { type: string }
        state: { type: string }
        postcode: { type: string }
        country: { type: string, example: 'United States' }
        phone: { type: string, nullable: true }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        price: { $ref: '#/components/schemas/Money' }
        compare_at_price: { $ref: '#/components/schemas/Money', nullable: true }
        image_url: { type: string, nullable: true }
        in_stock: { type: boolean }
        stock_status: { type: string, enum: [in_stock, low_stock, out_of_stock] }

    OrderLine:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        description: { type: string }
        quantity: { type: integer }
        unit_price: { $ref: '#/components/schemas/Money' }
        sub_total: { $ref: '#/components/schemas/Money' }
        discount_total: { $ref: '#/components/schemas/Money' }
        tax_total: { $ref: '#/components/schemas/Money' }
        total: { $ref: '#/components/schemas/Money' }
        image: { type: string, nullable: true }

    Order:
      type: object
      properties:
        id: { type: string }
        reference: { type: string }
        status: { type: string }
        payment_status: { type: string, enum: [pending, paid, failed, cancelled, refunded] }
        fulfillment_status: { type: string, enum: [unfulfilled, processing, shipped, delivered, returned] }
        customer_email: { type: string, format: email }
        tracking_number: { type: string }
        currency: { type: string, example: USD }
        total:
          type: object
          properties:
            formatted: { type: string, example: '$29.99 USD' }
            decimal: { $ref: '#/components/schemas/Money' }
            currency: { type: string }
        sub_total: { $ref: '#/components/schemas/Money' }
        tax_total: { $ref: '#/components/schemas/Money' }
        shipping_total: { $ref: '#/components/schemas/Money' }
        discount_total: { $ref: '#/components/schemas/Money' }
        lines:
          type: array
          items: { $ref: '#/components/schemas/OrderLine' }
        shipping_address: { $ref: '#/components/schemas/Address' }
        billing_address: { $ref: '#/components/schemas/Address' }
        created_at: { type: string, format: date-time }

    ShippingRate:
      type: object
      properties:
        method: { type: string, example: standard }
        label: { type: string, example: 'Standard Shipping' }
        price_minor: { type: integer, example: 0 }
        price_decimal: { $ref: '#/components/schemas/Money' }
        eta: { type: string, example: '5–7 business days' }
        free_over_minor: { type: integer, nullable: true }
        is_free: { type: boolean }

    Error:
      type: object
      properties:
        message: { type: string }

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: All systems OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  ts: { type: string, format: date-time }

  /products:
    get:
      summary: List products
      tags: [Products]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 24 }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, price_asc, price_desc, name_asc] }
        - name: brand
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  meta:
                    type: object
                    properties:
                      current_page: { type: integer }
                      last_page: { type: integer }
                      total: { type: integer }

  /products/{slug}:
    get:
      summary: Get product by slug
      tags: [Products]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /checkout/shipping-rates:
    get:
      summary: Get available shipping rates
      tags: [Checkout]
      parameters:
        - name: subtotal_minor
          in: query
          description: Cart subtotal in minor currency units (cents)
          schema: { type: integer, minimum: 0 }
        - name: coupon_code
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Available shipping methods with pricing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  rates:
                    type: array
                    items: { $ref: '#/components/schemas/ShippingRate' }

  /checkout/place-order:
    post:
      summary: Place an order
      tags: [Checkout]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                shipping_address_id:
                  type: integer
                  nullable: true
                  description: >
                    ID of a saved address from /me/addresses. When provided by an authenticated user,
                    the shipping block is populated server-side. shipping.email falls back to the
                    authenticated user's email if omitted.
                shipping_method: { type: string, enum: [standard, express], default: standard }
                payment_method: { type: string, enum: [card, cod], default: card }
                coupon_code: { type: string, nullable: true }
                customer_note: { type: string, nullable: true }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [variant_id, quantity]
                    properties:
                      variant_id: { type: integer }
                      quantity: { type: integer, minimum: 1 }
                shipping_address:
                  type: object
                  required: [first_name, last_name, line_one, city, state, postcode]
                  properties:
                    first_name: { type: string }
                    last_name: { type: string }
                    line_one: { type: string }
                    line_two: { type: string }
                    city: { type: string }
                    state: { type: string }
                    postcode: { type: string }
                    country_code: { type: string, default: US }
                    phone: { type: string }
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: '#/components/schemas/Order' }
                  payment_intent:
                    type: object
                    nullable: true
                    properties:
                      intent_id: { type: string }
                      client_secret: { type: string }
                      publishable_key: { type: string }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/track:
    post:
      summary: Track an order by email and reference
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, reference]
              properties:
                email: { type: string, format: email }
                reference: { type: string }
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: '#/components/schemas/Order' }
        '404':
          description: Order not found

  /orders:
    get:
      summary: List authenticated user's orders
      tags: [Orders]
      security:
        - sanctum: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200':
          description: Paginated orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
        '401':
          description: Unauthenticated

  /orders/{id}:
    get:
      summary: Get order detail
      tags: [Orders]
      security:
        - sanctum: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '404':
          description: Not found

  /admin/orders/{id}/refund:
    post:
      summary: Refund an order (admin)
      tags: [Admin]
      security:
        - sanctum: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Partial refund amount in dollars. Omit for full refund.
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: '#/components/schemas/Order' }
        '403':
          description: Forbidden
        '422':
          description: Refund not possible (e.g. order not paid)

  /admin/orders/{id}/return:
    post:
      summary: Mark an order as returned (admin)
      tags: [Admin]
      security:
        - sanctum: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Return recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: '#/components/schemas/Order' }
        '403':
          description: Forbidden
        '422':
          description: Return not possible (order not shipped/delivered)
